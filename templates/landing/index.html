{% extends 'base.html' %}
{% block title %}Alke Wallet — Tu billetera digital{% endblock %}
{% block content %}
<!-- Hero Landing -->
<main
  class="d-flex align-items-center justify-content-center"
  style="min-height: calc(100vh - 120px); padding: 3rem 0"
>
  <div class="container">
    <div class="row justify-content-center text-center">
      <div class="col-lg-10 col-xl-8">
        <!-- Logo -->
        <div class="logo-container mb-4 fade-in text-center">
          <i class="bi bi-wallet2 display-1 text-primary"></i>
        </div>

        <!-- Título -->
        <h1 class="display-3 fw-bold mb-4 fade-in-delay-1">Alke Wallet</h1>

        <p class="lead text-muted mb-5 px-md-5 fade-in-delay-2">
          Tu billetera digital segura y fácil de usar.<br />
          Envía, recibe y administra tu dinero en un solo lugar.
        </p>

        <!-- Características -->
        <div class="row g-2 mb-5 fade-in-delay-3 justify-content-center">
          <div class="col-md-3">
            <div class="feature-icon">
              <i class="bi bi-shield-check text-danger fs-1 mb-3"></i>
              <p class="text-muted mb-0 fw-semibold">Seguro</p>
            </div>
          </div>
          <div class="col-md-3">
            <div class="feature-icon">
              <i class="bi bi-lightning-charge text-warning fs-1 mb-3"></i>
              <p class="text-muted mb-0 fw-semibold">Rápido</p>
            </div>
          </div>
          <div class="col-md-3">
            <div class="feature-icon">
              <i class="bi bi-phone text-info fs-1 mb-3"></i>
              <p class="text-muted mb-0 fw-semibold">Fácil de usar</p>
            </div>
          </div>
        </div>

        <!-- Botón CTA -->
        <div class="mb-1 fade-in-delay-4">
          <a
            href="{% url 'login' %}"
            class="btn btn-primary btn-lg px-5 py-3 rounded-pill shadow-lg"
          >
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Ingresar a mi cuenta
          </a>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock %}
