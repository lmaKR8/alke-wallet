<!-- Navbar: visible sólo para usuarios autenticados -->
<nav class="navbar navbar-dark navbar-menu">
  <div class="container">
    <!-- Logo / Marca -->
    <a
      href="{% url 'dashboard' %}"
      class="navbar-brand mb-0 h1 text-white text-decoration-none"
    >
      <i class="bi bi-wallet2 me-2"></i>
      Mi Billetera
    </a>

    <!-- Acciones de la navbar -->
    <div class="d-flex align-items-center gap-2">
      <span class="text-white-75 small d-none d-sm-inline me-2">
        <i class="bi bi-person-circle me-1"></i>
        {{ user.user_name }}
      </span>
      <!-- Botón Cerrar Sesión -->
      <form method="post" action="{% url 'logout' %}" class="m-0">
        {% csrf_token %}
        <button
          type="submit"
          class="btn btn-outline-light btn-sm rounded-pill px-3"
        >
          <i class="bi bi-box-arrow-right me-1"></i>
          Salir
        </button>
      </form>
    </div>
  </div>
</nav>
