<!-- Alertas: Django messages → Bootstrap alerts con auto-dismissal -->
{% if messages %}
<div
  class="position-fixed top-0 start-50 translate-middle-x"
  style="z-index: 1055; margin-top: 80px; width: min(90%, 480px)"
>
  {% for message in messages %}
  <div
    class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-lg rounded-3 animate-fade-in-up"
    role="alert"
  >
    {% if message.tags == 'success' %}
    <i class="bi bi-check-circle-fill me-2"></i>
    {% elif message.tags == 'danger' %}
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    {% elif message.tags == 'warning' %}
    <i class="bi bi-exclamation-circle-fill me-2"></i>
    {% elif message.tags == 'info' %}
    <i class="bi bi-info-circle-fill me-2"></i>
    {% endif %} {{ message }}
    <button
      type="button"
      class="btn-close"
      data-bs-dismiss="alert"
      aria-label="Cerrar"
    ></button>
  </div>
  {% endfor %}
</div>
{% endif %}
